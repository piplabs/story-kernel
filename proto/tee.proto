syntax = "proto3";
package story.dkg.v1.types;

option go_package = "github.com/piplabs/story-kernel/types/pb/v0";

import "deal.proto";

service KernelService {
  rpc GetCodeCommitment(GetCodeCommitmentRequest) returns (GetCodeCommitmentResponse);
  rpc GenerateAndSealKey(GenerateAndSealKeyRequest) returns (GenerateAndSealKeyResponse);
  rpc GenerateDeals(GenerateDealsRequest) returns (GenerateDealsResponse);
  rpc ProcessDeals(ProcessDealsRequest) returns (ProcessDealsResponse);
  rpc ProcessResponses(ProcessResponsesRequest) returns (ProcessResponsesResponse);
  rpc ProcessJustification(ProcessJustificationRequest) returns (ProcessJustificationResponse);
  rpc FinalizeDKG(FinalizeDKGRequest) returns (FinalizeDKGResponse);
  rpc PartialDecryptTDH2(PartialDecryptTDH2Request) returns (PartialDecryptTDH2Response);
}

message GetCodeCommitmentRequest {}

message GetCodeCommitmentResponse {
  bytes code_commitment = 1;
}

message GenerateAndSealKeyRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  string address = 3 [json_name = "address"];
}

message GenerateAndSealKeyResponse {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  int64 start_block_height = 3 [json_name = "start_block_height"];
  bytes start_block_hash = 4 [json_name = "start_block_hash"];
  bytes dkg_pub_key = 5 [json_name = "dkg_pub_key"];
  bytes comm_pub_key = 6 [json_name = "comm_pub_key"];
  bytes enclave_report = 7 [json_name = "enclave_report"];
}

enum DKGStage {
  DKG_STAGE_UNSPECIFIED = 0;
  DKG_STAGE_REGISTRATION = 1;
  DKG_STAGE_DEALING = 2;
  DKG_STAGE_FINALIZATION = 3;
  DKG_STAGE_ACTIVE = 4;
  DKG_STAGE_FAILED = 5;
}

enum DKGRegStatus {
  DKG_REG_STATUS_UNSPECIFIED = 0;
  DKG_REG_STATUS_VERIFIED = 1;
  DKG_REG_STATUS_FINALIZED = 2;
  DKG_REG_STATUS_INVALIDATED = 3;
}

message DKGRegistration {
  uint32 round = 1 [json_name = "round"];
  string validator_addr = 2 [json_name = "validator_addr"];
  uint32 index = 3 [json_name = "index"];
  bytes dkg_pub_key = 4 [json_name = "dkg_pub_key"];
  bytes comm_pub_key = 5 [json_name = "comm_pub_key"];
  bytes pub_key_share = 6 [json_name = "pub_key_share"];
  bytes enclave_report = 7 [json_name = "enclave_report"];
  DKGRegStatus status = 8 [json_name = "status"];
  bytes code_commitment = 9 [json_name = "code_commitment"];
  bytes enclave_type = 10 [json_name = "enclave_type"];
}

message DKGNetwork {
  uint32 round = 1 [json_name = "round"];
  int64 start_block_height = 2 [json_name = "start_block_height"];
  bytes start_block_hash = 3 [json_name = "start_block_hash"];
  repeated string active_val_set = 4 [json_name = "active_val_set"];
  uint32 total = 5 [json_name = "total"];
  uint32 threshold = 6 [json_name = "threshold"];
  DKGStage stage = 7 [json_name = "stage"];
  bool is_resharing = 8 [json_name = "is_resharing"];
  bytes global_public_key = 9 [json_name = "global_public_key"];
  repeated bytes public_coeffs = 10 [json_name = "public_coeffs"];
  bool is_upgrade = 11 [json_name = "is_upgrade"];
}

message GenerateDealsRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  bool is_resharing = 3 [json_name = "is_resharing"];
}

message GenerateDealsResponse {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  repeated Deal deals = 3 [json_name = "deals"];
}

message ProcessDealsRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  repeated Deal deals = 3 [json_name = "deals"];
  bool is_resharing = 4 [json_name = "is_resharing"];
}

message ProcessDealsResponse {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  repeated Response responses = 3 [json_name = "responses"];
}

message ProcessResponsesRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  repeated Response responses = 3 [json_name = "responses"];
  bool is_resharing = 4 [json_name = "is_resharing"];
}

message ProcessResponsesResponse {
  repeated Justification justifications = 1 [json_name = "justifications"];
}

// ProcessJustificationRequest is sent to TEE to process valid justifications
// and restore the DKG state by accepting the originally-complained deals.
message ProcessJustificationRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  repeated Justification justifications = 3 [json_name = "justifications"];
  bool is_resharing = 4 [json_name = "is_resharing"];
}

// ProcessJustificationResponse is returned from TEE after processing justifications.
message ProcessJustificationResponse {}

message FinalizeDKGRequest {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  bool is_resharing = 3 [json_name = "is_resharing"];
}

message FinalizeDKGResponse {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  bytes participants_root = 3 [json_name = "participants_root"];
  bytes global_pub_key = 4 [json_name = "global_pub_key"];
  repeated bytes public_coeffs = 5 [json_name = "public_coeffs"];
  bytes pub_key_share = 6 [json_name = "pub_key_share"];
  bytes signature = 7 [json_name = "signature"];
}

message PartialDecryptTDH2Request {
  bytes code_commitment = 1 [json_name = "code_commitment"];
  uint32 round = 2 [json_name = "round"];
  bytes ciphertext = 3 [json_name = "ciphertext"];
  bytes label = 4 [json_name = "label"];
  bytes global_pub_key = 5 [json_name = "global_pub_key"];
  bytes requester_pub_key = 6 [json_name = "requester_pub_key"]; // secp256k1 uncompressed
}

message PartialDecryptTDH2Response {
  bytes encrypted_partial_decryption = 1 [json_name = "encrypted_partial_decryption"];
  bytes ephemeral_pub_key = 2 [json_name = "ephemeral_pub_key"];
  bytes pub_share = 3 [json_name = "pub_share"];
  bytes signature = 4 [json_name = "signature"];
}
